<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Encaixa Peças</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: #f8fafc;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: #0f172a;
    touch-action: manipulation;
    overscroll-behavior: none;
    user-select: none;
  }
  body {
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  #gameWrap {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 800;
    letter-spacing: 0.3px;
  }
  #pauseBtn {
    background: #ffffff;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 18px;
    box-shadow: 0 2px 4px rgba(0,0,0,.05);
    cursor: pointer;
  }
  #pauseBtn:active { transform: scale(0.97); }
  .info {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .info > div {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 8px 10px;
    text-align: center;
    font-weight: 700;
    color: #334155;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
    font-size: 14px;
  }
  .info span { display: block; font-size: 18px; color: #0f172a; margin-top: 2px; }
  .board-container {
    position: relative;
    width: 300px;
    height: 600px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(15,23,42,.08);
    overflow: hidden;
    border: 1px solid #e2e8f0;
  }
  canvas { display: block; background: white; }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(248,250,252,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 20px;
  }
  #overlayTitle {
    font-size: 28px;
    font-weight: 800;
    margin: 0;
    color: #0f172a;
  }
  #startBtn {
    font-size: 26px;
    font-weight: 800;
    padding: 18px 36px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 16px;
    box-shadow: 0 10px 20px rgba(59,130,246,.35);
    cursor: pointer;
  }
  #startBtn:active { transform: translateY(1px) scale(0.99); }
  .controls {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 14px;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .controls button {
    height: 58px;
    font-size: 26px;
    background: #ffffff;
    border: 1px solid #cbd5e1;
    border-radius: 14px;
    box-shadow: 0 3px 6px rgba(0,0,0,.06);
    cursor: pointer;
  }
  .controls button:active { background: #f1f5f9; transform: scale(0.98); }
  .hint {
    text-align: center;
    font-size: 12px;
    color: #64748b;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div id="gameWrap">
    <header>
      <h1>Encaixa Peças</h1>
      <button id="pauseBtn" aria-label="Pausar">⏸️</button>
    </header>

    <div class="info">
      <div>Pontos <span id="score">0</span></div>
      <div>Nível <span id="level">1</span></div>
      <div>Linhas <span id="lines">0</span></div>
    </div>

    <div class="board-container">
      <canvas id="board" width="300" height="600"></canvas>
      <div id="overlay">
        <h2 id="overlayTitle">Encaixa Peças</h2>
        <button id="startBtn">Iniciar</button>
      </div>
    </div>

    <div class="controls">
      <button data-action="left" aria-label="Esquerda">◀</button>
      <button data-action="right" aria-label="Direita">▶</button>
      <button data-action="rotate" aria-label="Girar">⟳</button>
      <button data-action="down" aria-label="Baixo">▼</button>
      <button data-action="drop" aria-label="Soltar">⤓</button>
    </div>
    <div class="hint">Toque nos botões ou use as setas do teclado</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const pauseBtn = document.getElementById('pauseBtn');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const linesEl = document.getElementById('lines');

  const COLS = 10, ROWS = 20, SIZE = 30;

  const PIECES = {
    I: [[1,1,1,1]],
    O: [[1,1],[1,1]],
    T: [[0,1,0],[1,1,1]],
    S: [[0,1,1],[1,1,0]],
    Z: [[1,1,0],[0,1,1]],
    J: [[1,0,0],[1,1,1]],
    L: [[0,0,1],[1,1,1]]
  };

  const COLORS = {
    I: '#3b82f6',   // blue
    O: '#facc15',   // yellow
    T: '#a855f7',   // purple
    S: '#22c55e',   // green
    Z: '#ef4444',   // red
    J: '#1e40af',   // darkblue
    L: '#f97316'    // orange
  };

  let board, current, dropInterval, lastTime, animationId;
  let score, level, lines, gameRunning = false, paused = false;

  function createBoard() {
    board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  }

  function randomType() {
    const types = ['I','O','T','S','Z','J','L'];
    return types[Math.floor(Math.random()*types.length)];
  }

  function spawnPiece() {
    const type = randomType();
    const shape = PIECES[type];
    const x = Math.floor(COLS/2) - Math.floor(shape[0].length/2);
    const y = 0; // garantir y=0 para todas as peças
    current = { type, shape, x, y, color: COLORS[type] };
  }

  function isValid(nx, ny, shape) {
    for (let y=0; y<shape.length; y++) {
      for (let x=0; x<shape[y].length; x++) {
        if (shape[y][x]) {
          const bx = nx + x;
          const by = ny + y;
          if (bx < 0 || bx >= COLS || by >= ROWS) return false;
          if (by >= 0 && board[by][bx]) return false;
        }
      }
    }
    return true;
  }

  function rotateShape(shape) {
    return shape[0].map((_, i) => shape.map(row => row[i]).reverse());
  }

  function moveLeft() {
    if (!gameRunning || paused) return;
    if (isValid(current.x-1, current.y, current.shape)) current.x--;
  }
  function moveRight() {
    if (!gameRunning || paused) return;
    if (isValid(current.x+1, current.y, current.shape)) current.x++;
  }
  function moveDown() {
    if (!gameRunning || paused) return false;
    if (isValid(current.x, current.y+1, current.shape)) {
      current.y++;
      return true;
    } else {
      lockPiece();
      return false;
    }
  }
  function hardDrop() {
    if (!gameRunning || paused) return;
    let drops = 0;
    while (isValid(current.x, current.y+1, current.shape)) {
      current.y++; drops++;
    }
    score += drops * 2;
    lockPiece();
    updateStats();
  }
  function rotate() {
    if (!gameRunning || paused) return;
    const newShape = rotateShape(current.shape);
    const kicks = [0, -1, 1, -2, 2];
    for (let k of kicks) {
      if (isValid(current.x + k, current.y, newShape)) {
        current.x += k;
        current.shape = newShape;
        break;
      }
    }
  }

  function lockPiece() {
    for (let y=0; y<current.shape.length; y++) {
      for (let x=0; x<current.shape[y].length; x++) {
        if (current.shape[y][x]) {
          const by = current.y + y;
          const bx = current.x + x;
          if (by >= 0) board[by][bx] = current.color;
        }
      }
    }
    clearLines();
    spawnPiece();
    if (!isValid(current.x, current.y, current.shape)) {
      gameOver();
    }
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS-1; y >= 0; ) {
      if (board[y].every(cell => cell)) {
        board.splice(y,1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
      } else {
        y--;
      }
    }
    if (cleared > 0) {
      lines += cleared;
      const points = [0,100,300,500,800][cleared] || 0;
      score += points * level;
      level = Math.floor(lines/10) + 1;
      dropInterval = Math.max(100, 800 - (level-1)*70);
      updateStats();
    }
  }

  function updateStats() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    linesEl.textContent = lines;
  }

  function drawCell(x, y, color) {
    const px = x * SIZE;
    const py = y * SIZE;
    ctx.fillStyle = color;
    ctx.fillRect(px+1, py+1, SIZE-2, SIZE-2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(px+1, py+1, SIZE-2, 6);
  }

  function draw() {
    // fundo branco do tabuleiro
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // grade leve
    ctx.strokeStyle = '#eef2f7';
    ctx.lineWidth = 1;
    for (let x=1; x<COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*SIZE,0); ctx.lineTo(x*SIZE,ROWS*SIZE); ctx.stroke();
    }
    for (let y=1; y<ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0,y*SIZE); ctx.lineTo(COLS*SIZE,y*SIZE); ctx.stroke();
    }

    // peças fixas
    for (let y=0; y<ROWS; y++) {
      for (let x=0; x<COLS; x++) {
        if (board[y][x]) drawCell(x,y,board[y][x]);
      }
    }
    // peça atual
    if (current) {
      for (let y=0; y<current.shape.length; y++) {
        for (let x=0; x<current.shape[y].length; x++) {
          if (current.shape[y][x]) {
            drawCell(current.x + x, current.y + y, current.color);
          }
        }
      }
    }
  }

  function loop(timestamp) {
    if (!gameRunning) return;
    if (!paused) {
      if (lastTime === 0) lastTime = timestamp;
      const delta = timestamp - lastTime;
      if (delta > dropInterval) {
        moveDown();
        lastTime = timestamp;
      }
    }
    draw(); // garante desenho a cada frame
    animationId = requestAnimationFrame(loop);
  }

  function startGame() {
    createBoard();
    score = 0; level = 1; lines = 0; dropInterval = 800; lastTime = 0;
    updateStats();
    spawnPiece();
    gameRunning = true;
    paused = false;
    overlay.style.display = 'none';
    draw(); // desenha peça imediatamente
    cancelAnimationFrame(animationId);
    requestAnimationFrame(loop);
  }

  function pauseGame() {
    if (!gameRunning || paused) return;
    paused = true;
    overlayTitle.textContent = 'Pausado';
    startBtn.textContent = 'Continuar';
    overlay.style.display = 'flex';
  }

  function resumeGame() {
    paused = false;
    overlay.style.display = 'none';
    lastTime = 0;
  }

  function gameOver() {
    gameRunning = false;
    paused = false;
    overlayTitle.textContent = 'Fim de Jogo';
    startBtn.textContent = 'Jogar Novamente';
    overlay.style.display = 'flex';
  }

  // Controles
  startBtn.addEventListener('click', () => {
    console.log('jogo iniciado');
    if (!gameRunning) {
      startGame();
    } else if (paused) {
      resumeGame();
    }
  });

  pauseBtn.addEventListener('click', pauseGame);

  function handleAction(action) {
    switch(action) {
      case 'left': moveLeft(); break;
      case 'right': moveRight(); break;
      case 'down': moveDown(); score+=1; updateStats(); break;
      case 'rotate': rotate(); break;
      case 'drop': hardDrop(); break;
    }
    draw();
  }

  document.querySelectorAll('[data-action]').forEach(btn => {
    const act = btn.dataset.action;
    const handler = (e) => { e.preventDefault(); handleAction(act); };
    btn.addEventListener('touchstart', handler, {passive:false});
    btn.addEventListener('mousedown', handler);
  });

  window.addEventListener('keydown', (e) => {
    if (!gameRunning) return;
    if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' ','p','P'].includes(e.key)) e.preventDefault();
    switch(e.key) {
      case 'ArrowLeft': moveLeft(); break;
      case 'ArrowRight': moveRight(); break;
      case 'ArrowDown': moveDown(); score+=1; updateStats(); break;
      case 'ArrowUp': rotate(); break;
      case ' ': case 'Spacebar': hardDrop(); break;
      case 'p': case 'P': paused ? resumeGame() : pauseGame(); break;
    }
    draw();
  });

  // Desenho inicial
  createBoard();
  draw();
})();
</script>

<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;var productId=extractProductId(target)||extractProductId(a);if(!productId)return;e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*")},true)})();</script></body>
</html>
